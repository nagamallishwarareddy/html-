<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(to bottom right, #cfd9df, #e2ebf0);
}

.card{
    width:350px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    background:white;
}

.top-section{
    background: linear-gradient(to right, #4e73df, #1cc88a);
    text-align:center;
    padding:40px 20px 60px 20px;
    color:white;
    position:relative;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid white;
    object-fit:cover;
}

.name{
    font-size:28px;
    font-weight:600;
    margin-top:15px;
}

.title{
    font-size:16px;
    font-weight:300;
    opacity:0.9;
}

.bottom-section{
    padding:30px 25px;
    text-align:center;
}

h3{
    margin:15px 0;
    color:#4e73df;
}

.about{
    font-size:14px;
    color:#555;
    margin-bottom:15px;
}

.skills{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.skill{
    background:#4e73df;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}

.social-icons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:15px 0;
}

.social-icons a{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#4e73df;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.social-icons a:hover{
    background:#1cc88a;
    transform:scale(1.1);
}

.contact-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 30px;
    background:linear-gradient(to right, #4e73df, #1cc88a);
    color:white;
    border-radius:30px;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.contact-btn:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<div class="card">

    <div class="top-section">
        <img src="https://i.pravatar.cc/150" alt="Profile" class="profile-img">
        <div class="name">John Doe</div>
        <div class="title">Web Developer</div>
    </div>

    <div class="bottom-section">
        <h3>About Me</h3>
        <p class="about">
            I'm a passionate web developer with experience in creating modern and responsive websites.
        </p>

        <h3>Skills</h3>
        <div class="skills">
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
            <div class="skill">JavaScript</div>
            <div class="skill">Photoshop</div>
        </div>

        <div class="social-icons">
            <a href="#">F</a>
            <a href="#">T</a>
            <a href="#">I</a>
            <a href="#">L</a>
        </div>

        <a href="#" class="contact-btn">Contact Me</a>

    </div>

</div>

</body>
</html>
